# TASKPLAN — Beispielkonfiguration
#
# Kopieren nach:  ~/.taskplan/taskplan.toml   (benutzerweit)
#             oder ./taskplan.toml            (projektlokal, hat Vorrang)
#
# NICHTS hiervon ist Pflicht. Ohne Konfiguration gelten die Defaults, und die
# sind die konservativen: alle drei Rollen aktiv und getrennt, Tiefe an,
# Aufwandsdecke "medium", Lock-Provider "lockmaster".

# ---------------------------------------------------------------------------
# SPRACHE der Rollen-Prompts
# ---------------------------------------------------------------------------
# Die drei Rollen (TASKSOLVER, TASKWRITER, MAINTAINER) liegen auf Deutsch und
# Englisch vor. Default ist "en" — das Modul ist nutzerneutral.
# Override auch per ENV: TASKPLAN_LANG=de
[language]
prompts = "en"   # de | en

# ---------------------------------------------------------------------------
# SPEICHER — wo die Aufgaben liegen
# ---------------------------------------------------------------------------
[storage]
backend = "sqlite"                       # sqlite (empfohlen) | files | custom
path = "~/.taskplan/taskplan.db"

# Aufloesung (erster Treffer gewinnt):
#   1. ENV TASKPLAN_DB      (Notausstieg fuer einen einzelnen Lauf)
#   2. diese Datei
#   3. ENV RINNSAL_DB       (Alt-Kompatibilitaet)
#   4. ~/.taskplan/taskplan.db
#
# Welche DB gerade aktiv ist:  python -m taskplan doctor
# Der Doctor WARNT, wenn die aktive DB leer ist, waehrend eine andere Daten
# enthaelt — genau dieser stille Fehler kostete hier Wochen: Schreibzugriffe
# landeten in einer Datenbank, die niemand liest.

# ---------------------------------------------------------------------------
# LOOP — Tiefe und Aufwandsdecke
# ---------------------------------------------------------------------------
[loop]
effort_ceiling = "medium"   # easy | medium
                            # large/special sind NIE autonom, unabhaengig davon
max_bundle_size = 3         # Aufgaben je Durchlauf — aus EINEM Projekt

[loop.deep]
enabled = true              # false = nur Oberflaeche (das alte Verhalten)
easy_first_globally = true  # easy ueber ALLE Roots erschoepfen, DANN erst medium
                            # Begruendung: Leichte Aufgaben entlasten genau die,
                            # die tief in einem Spezialthema stecken. Deshalb
                            # existiert die Unterscheidung ueberhaupt.
projects_per_dive = 1

# ---------------------------------------------------------------------------
# ROLLEN — einzeln abschaltbar, optional zusammengelegt
# ---------------------------------------------------------------------------
[roles]
taskwriter = true     # erkennt und formalisiert Aufgaben
tasksolver = true     # arbeitet sie ab
maintainer = true     # haelt Dateien und Verzeichnisse sauber
                      # false -> der Starter bricht sauber ab (kein Leerlauf)

combined = false      # true = EIN Worker deckt alle aktiven Rollen ab,
                      # statt drei getrennter Instanzen.
                      # maintainer=false + combined=true ergibt den 2-in-1-Worker.
                      #
                      # ACHTUNG: Die Rollentrennung ist eine QUALITAETSGRENZE —
                      # der Writer soll nicht ausfuehren, was er selbst gerade
                      # formuliert hat. Im combined-Modus muss sie als
                      # Phasenwechsel im Worker erhalten bleiben.

# ---------------------------------------------------------------------------
# MODELLE — gehoeren in die Konfiguration, nicht in den Starter
# ---------------------------------------------------------------------------
[models]
default    = "claude-sonnet-5"
taskwriter = "claude-sonnet-5"   # Analyse/Formalisierung
tasksolver = "claude-opus-4-8"   # setzt um, braucht mehr Urteil
maintainer = "claude-sonnet-5"   # mechanische Pflege

# ---------------------------------------------------------------------------
# TRAVERSIERUNG — was ist eine Root, was ein Projekt?
# ---------------------------------------------------------------------------
[traversal]
# Das Roots-Inventar wird NICHT dupliziert. Existiert schon eine Roots-Liste
# (z. B. die des Lock-Scanners), zeigt man hierauf — zwei Listen wuerden
# unweigerlich auseinanderlaufen.
roots_file = "~/OneDrive/_scripts/lock_roots.json"

# Alternativ (oder zusaetzlich) direkt:
# roots = ["~/projekte/alpha", "~/projekte/beta"]

skip_dirs = ["_archive", "_archiviert", "node_modules", ".venv", "__pycache__"]

# --- WIE werden Projekte gefunden? -----------------------------------------
# "auto"    nur ueber Marker. Schnell — aber blind fuer Systeme, die diese
#           Konventionen gar nicht benutzen.
# "manual"  NUR die gepflegte Liste (projects.json). Fuer Installationen, deren
#           Struktur sich nicht aus Dateinamen ableiten laesst.
# "hybrid"  beides, dedupliziert (DEFAULT). Die Automatik traegt, die Registry
#           korrigiert. Eingetragene Projekte gewinnen bei Konflikten — wer von
#           Hand eintraegt, hat einen Grund.
discovery = "hybrid"

registry_file = "~/.taskplan/projects.json"

#     python -m taskplan projects list
#     python -m taskplan projects add <pfad> <root_id> "<begruendung>" --by maintainer
#     python -m taskplan projects remove <pfad>
#
# Der MAINTAINER pflegt diese Liste automatisch nach: Er prueft, ob die
# Erfassung stimmt, und traegt fehlende oder falsch erkannte Projekte ein.

# Tiefe der Auto-Suche. Gesetzt = AUTO-MODUS: das oberste markierte Verzeichnis
# je Pfad. Noetig, sobald die Roots unterschiedlich tief sind — der Normalfall.
max_depth = 3

# Einfache Variante (eine Liste, ein Treffer genuegt):
# markers = ["TODO.md", "CLAUDE.md", ".git", "pyproject.toml"]


# ===========================================================================
# MARKER — woran erkennt man ein Projekt? FUENF Kategorien.
# ===========================================================================
# Ein einzelner Marker reicht nie fuer alle Systeme: `TODO.md` liegt auch in
# Ordnern, die keine Projekte sind. `.git` fehlt bei allem, was nie versioniert
# wurde. Und manche Strukturen erkennt man nur am Ordnernamen.
[traversal.markers]

# --- VERKNUEPFUNG ----------------------------------------------------------
# Kurzform:
#   combine = "any"   ein Treffer genuegt (grosszuegig — findet viel, auch Falsches)
#   combine = "all"   jede AKTIVE Kategorie muss treffen (streng)
combine = "any"

# Voller Ausdruck — UND, ODER, NICHT, Klammern. Gewinnt ueber `combine`.
# Noetig, sobald "alles oder eines" nicht mehr reicht:
#
#   expression = "(dir_patterns AND files) OR git"
#         Ein GROSS geschriebener Ordner MIT einer Markerdatei — oder ein Repo.
#
#   expression = "files AND NOT git"
#         Nur unversionierte Projekte (z. B. Doku-Ablagen).
#
#   expression = "git OR (dir_patterns AND (files OR subdirs))"
#
# Erlaubt: dir_patterns, files, subdirs, git, flag_file, AND/OR/NOT
# (auch UND/ODER/NICHT), Klammern. Ein Tippfehler ist ein FEHLER, kein stilles
# "trifft nie" — sonst faende der Loop schweigend gar nichts mehr.
#
# expression = "(dir_patterns AND files) OR git OR flag_file"

# --- 1. ORDNERMERKMALE -----------------------------------------------------
# Muster im ORDNERNAMEN. Ein SCHWACHES Signal — gut als Bestandteil einer
# Kombination, selten allein. Default: aus.
[traversal.markers.dir_patterns]
enabled = false
patterns = ["^\\.", "^[A-Z]"]   # Punkt am Anfang | Grossbuchstabe am Anfang
require_all = false             # true = ALLE Muster muessen passen

# --- 2. MARKERDATEIEN ------------------------------------------------------
# CLAUDE.md ist SPEZIFISCHER als TODO.md: Ein TODO.md liegt in jedem zweiten
# Ordner, eine CLAUDE.md nur dort, wo jemand bewusst einen Agentenkontext
# angelegt hat.
[traversal.markers.files]
enabled = true
names = ["CLAUDE.md", "AGENTS.md", "TODO.md", "ROADMAP.md",
         "AUFGABEN.md", "AUFGABEN.txt", "pyproject.toml", "package.json"]
require_all = false   # true = ALLE Dateien muessen da sein (z. B. CLAUDE.md UND TODO.md)

# --- 3. SUBORDNER ----------------------------------------------------------
[traversal.markers.subdirs]
enabled = true
names = [".claude"]   # `.git` steht NICHT hier — es hat eine eigene Kategorie
require_all = false

# --- 4. GIT ----------------------------------------------------------------
# Eigene Kategorie, weil ein Repository ein STARKES Signal ist: Wer `git init`
# gemacht hat, hat eine Grenze gezogen.
[traversal.markers.git]
enabled = true
# In Worktrees und Submodulen ist `.git` eine DATEI, kein Verzeichnis — beides
# zaehlt. true = nur echte Repos, keine Worktrees/Submodule.
require_worktree_root = false

# --- 5. FLAGDATEI (der letzte Automatik-Fallback) ---------------------------
# Wo keine Heuristik greift: eine Datei ablegen, und die Sache ist entschieden.
# Sie schlaegt JEDE Heuristik — auch combine = "all".
#
#     python -m taskplan projects flag <pfad> "Begruendung"
#     python -m taskplan projects unflag <pfad>
#
# Bewusst abschaltbar: Manche Nutzer wollen keine fremden Dateien in ihren
# Projekten. Fuer sie bleibt der Handeintrag in der Registry (siehe oben).
[traversal.markers.flag_file]
enabled = true
name = ".taskplan-project"    # frei waehlbar, z. B. "itsa.project"

# Die Ebenen sind konfigurierbar, nicht fest verdrahtet. Genau EINE traegt
# `is_work_unit` — sie bestimmt, was Rotation, Lock-Scope und `project_path`
# als "Projekt" verstehen.
#
# Zweistufig (Default): Root -> Projekt
[[traversal.levels]]
name = "root"

[[traversal.levels]]
name = "project"
markers = ["TODO.md", "ROADMAP.md", "AUFGABEN.md", ".git", "pyproject.toml"]
is_work_unit = true

# Dreistufig (Root -> Slot -> Unterprojekt): einfach eine Ebene dazwischen
# haengen. Ein Slot braucht keine Marker — er gruppiert nur.
#
# [[traversal.levels]]
# name = "root"
# [[traversal.levels]]
# name = "slot"
# [[traversal.levels]]
# name = "project"
# markers = ["TODO.md"]
# is_work_unit = true

# ---------------------------------------------------------------------------
# LOCKS — andere Systeme, andere Lock-Systeme
# ---------------------------------------------------------------------------
[locks]
# "lockmaster" = bekanntes Schema (LOCK*.txt + LOCK.permissions.json).
#                Wird deterministisch ausgewertet.
# "rules"      = FREMDES Lock-System. Das Modul wertet dann NICHTS aus, sondern
#                reicht die hinterlegten Regeldateien als Text in den Prompt —
#                das LLM liest sie und wendet sie an.
#                Lieber ein Agent, der die echte Regel liest, als ein Parser,
#                der ihre Bedeutung errät.
# "none"       = kein Lock-System.
provider = "lockmaster"
max_depth = 4

# Nur fuer provider = "rules" (oder ergaenzend):
# rule_paths = ["~/meinprojekt/LOCK-REGELN.md"]

# Das Achsenmodell gilt unabhaengig vom Provider:
#   Lesen/Analysieren   IMMER erlaubt — ein Lock schuetzt vor Aenderung,
#                       nicht vor Kenntnisnahme.
#   Neue Datei anlegen  in der Regel erlaubt (kollidiert nicht mit fremder
#                       Arbeit an BESTEHENDEN Dateien).
#   Aendern             nur ohne fremden Lock im Scope.
#   LOCK.user*.txt      absolut — nur der Nutzer entfernt ihn.
#
# Und: Ein Lock in einem Projekt sperrt DIESES Projekt. Nicht seine Nachbarn
# und nicht die ganze Pipeline.
